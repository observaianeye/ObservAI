name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Unit tests (vitest)
        env:
          DATABASE_URL: file:./test.db
        run: npm test

      - name: Build
        run: npm run build

  python-analytics:
    name: Python Analytics Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/camera-analytics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install core deps (no GPU)
        run: |
          pip install --upgrade pip
          pip install numpy opencv-python-headless pyyaml shapely pytest pytest-timeout pytest-benchmark

      - name: Run unit tests (skip GPU-gated and real-video tests)
        # GPU/integration tests rely on self-hosted runner — exclude here
        run: pytest -v -m "not gpu and not integration and not fixture_video"

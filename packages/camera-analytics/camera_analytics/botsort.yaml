tracker_type: botsort
# Stage 6: further relaxed so weak detections (conf 0.25-0.4 after yaml change)
# still survive tracking. High thresh 0.35 lets a low-confidence bbox confirm a
# track; new_track 0.40 still guards against spurious new IDs from single-frame
# noise. Extra ID churn is absorbed by appearance_thresh + track_buffer.
track_high_thresh: 0.35
track_low_thresh: 0.1
new_track_thresh: 0.40
# Stage 5: 150 → 300 (~5s → ~10s) — tolerate longer stillness/occlusion before ID reset
track_buffer: 300
# Lower IoU threshold is MORE permissive for matching (costs below threshold
# are matched). Reduces ID swaps on near-miss bboxes.
match_thresh: 0.65
fuse_score: True
# BoT-SORT specific
gmc_method: none
proximity_thresh: 0.5
# Stage 4: stronger ReID emphasis so appearance features pin the right ID under motion
appearance_thresh: 0.50
with_reid: True
model: auto

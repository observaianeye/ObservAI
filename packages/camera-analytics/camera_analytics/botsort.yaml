tracker_type: botsort
# Stage 5: relaxed thresholds so static/partially-occluded people keep their
# tracks. Prior Stage 4 values (0.60/0.70) dropped tracks on weak detections
# — static persons whose confidence dips below threshold for a few frames
# disappeared from the UI even though YOLO still saw them.
track_high_thresh: 0.50
track_low_thresh: 0.1
new_track_thresh: 0.55
# Stage 5: 150 → 300 (~5s → ~10s) — tolerate longer stillness/occlusion before ID reset
track_buffer: 300
# Lower IoU threshold is MORE permissive for matching (costs below threshold
# are matched). Reduces ID swaps on near-miss bboxes.
match_thresh: 0.65
fuse_score: True
# BoT-SORT specific
gmc_method: none
proximity_thresh: 0.5
# Stage 4: stronger ReID emphasis so appearance features pin the right ID under motion
appearance_thresh: 0.50
with_reid: True
model: auto

entrance_line:
  start: [0.05, 0.95]
  end: [0.95, 0.95]
  inside_on: top

# Minimal zone configuration (Entry/Exit only)
tables:
  - id: entrance_zone
    name: Entrance
    polygon:
      - [0.05, 0.05]
      - [0.30, 0.05]
      - [0.30, 0.95]
      - [0.05, 0.95]
  - id: exit_zone
    name: Exit
    polygon:
      - [0.70, 0.05]
      - [0.95, 0.05]
      - [0.95, 0.95]
      - [0.70, 0.95]

heatmap:
  grid_width: 6
  grid_height: 4

# Task 2.1.2: YOLO Model Optimization
# NMS IoU threshold: lower = stricter duplicate removal (faster, may miss overlapping people)
# Range: 0.3 (aggressive) to 0.7 (permissive). Default: 0.45
nms_iou_threshold: 0.45

# YOLO input size: smaller = faster inference, lower accuracy
# Options: 320 (speed), 416 (balanced), 480 (quality), 640 (max quality)
# ivCam ile 720p+ için 640 tavsiye edilir
yolo_input_size: 640

# Class-agnostic NMS: faster for single-class (person) detection
agnostic_nms: true

# Confidence threshold for person detection
confidence_threshold: 0.5

# Max detections per frame (increase for crowded scenes)
max_detections: 100

# Task 2.2.1: Demographic Prediction Improvement
# EMA smoothing factor for age: 0.1 (very smooth) to 0.5 (responsive).
# face_detection_interval=1 provides 3x more samples — higher alpha for faster convergence
demo_age_ema_alpha: 0.25

# Minimum model confidence to accept a demographic prediction
# Higher = reject noisy detections. Range: 0.1-0.5. Default: 0.30
# RTX 5070 + 960x960 det_size: higher threshold for cleaner predictions
demo_min_confidence: 0.40

# Gender consensus threshold: fraction of weighted votes needed to assign gender
# Higher = stronger agreement needed. Range: 0.55-0.85.
# 80% requires strong agreement — prevents ambiguous faces from flipping gender
demo_gender_consensus: 0.80

# Max history samples for temporal smoothing (age and gender)
# More samples = more stable predictions over time
demo_max_age_history: 80
demo_max_gender_history: 80

# Temporal decay for older gender votes (per sample, recent = 1.0)
# Lower = older votes fade faster, helps correct early misclassifications
demo_temporal_decay: 0.85

# Continuous refinement: keep improving demographics even after initial classification
# Set to false for legacy behavior (stop after first good classification)
demo_continuous_refinement: true

# Performance: Face detection frequency (her kaç frame'de bir)
# RTX 5070: every 3 frames — good FPS on crowded scenes while keeping demographics responsive
face_detection_interval: 3

# Gender lock: once gender has N consecutive same-gender high-confidence votes, lock it
# With interval=1, votes arrive fast — need more evidence before locking
demo_gender_lock_threshold: 8

# Performance: Demografi minimum bbox boyutları (pixels)
# ivCam kalitesi arttığı için daha küçük kişileri de işliyoruz
demo_min_bbox_width: 25
demo_min_bbox_height: 40
demo_min_crop_height: 30
demo_min_crop_width: 20

# Queue analytics
queue_alert_threshold: 5
queue_wait_time_window: 300

# Zone entry/exit debounce (frame count)
zone_enter_debounce_frames: 3
zone_exit_debounce_frames: 5

# Bbox smoothing EMA alpha range (lower min = heavier smoothing for stationary)
bbox_smoothing_alpha_min: 0.2
bbox_smoothing_alpha_max: 0.9

# Table occupancy tracking
# Kişi masadan kalktıktan sonra "temizlik bekliyor" süresi (saniye)
table_needs_cleaning_timeout: 60
# "Temizlik bekliyor" → "boş" geçiş süresi (saniye)
table_empty_timeout: 180
# Uzun oturma uyarısı (saniye, 90 dakika = 5400)
table_long_occupancy_alert: 5400

entrance_line:
  start: [0.05, 0.95]
  end: [0.95, 0.95]
  inside_on: top

# Minimal zone configuration (Entry/Exit only)
tables:
  - id: entrance_zone
    name: Entrance
    polygon:
      - [0.05, 0.05]
      - [0.30, 0.05]
      - [0.30, 0.95]
      - [0.05, 0.95]
  - id: exit_zone
    name: Exit
    polygon:
      - [0.70, 0.05]
      - [0.95, 0.05]
      - [0.95, 0.95]
      - [0.70, 0.95]

heatmap:
  grid_width: 6
  grid_height: 4

# Task 2.1.2: YOLO Model Optimization
# NMS IoU threshold: lower = stricter duplicate removal (faster, may miss overlapping people)
# Range: 0.3 (aggressive) to 0.7 (permissive). Default: 0.45
nms_iou_threshold: 0.45

# YOLO input size: smaller = faster inference, lower accuracy
# Options: 320 (speed), 416 (balanced), 480 (quality), 640 (max quality)
# ivCam ile 720p+ için 640 tavsiye edilir
yolo_input_size: 640

# Class-agnostic NMS: faster for single-class (person) detection
agnostic_nms: true

# Confidence threshold for person detection.
# Stage 5: 0.5 → 0.4 — static/seated persons often score 0.4-0.55; the previous
# threshold dropped them entirely. Lower value + relaxed tracker thresholds in
# botsort.yaml keep them tracked without noticeably more false positives.
confidence_threshold: 0.4

# Max detections per frame (increase for crowded scenes)
max_detections: 100

# Task 2.2.1: Demographic Prediction Improvement
# EMA smoothing factor for age: 0.1 (very smooth) to 0.5 (responsive).
# Stage 3: 0.25 → 0.20 — slightly more stable average, less flip-flop on noisy faces
demo_age_ema_alpha: 0.20

# Minimum model confidence to accept a demographic prediction
# Higher = reject noisy detections. Range: 0.1-0.5.
# Stage 3: 0.40 → 0.35 — more signal from distant/profile faces
demo_min_confidence: 0.45

# Gender consensus threshold: fraction of weighted votes needed to assign gender
# Higher = stronger agreement needed. Range: 0.55-0.85.
# Stage 3: 0.80 → 0.70 — faster response, fewer "stuck" genders on short clips
demo_gender_consensus: 0.70

# Max history samples for temporal smoothing (age and gender)
# More samples = more stable predictions over time
demo_max_age_history: 80
demo_max_gender_history: 80

# Temporal decay for older gender votes (per sample, recent = 1.0)
# Stage 3: 0.92 → 0.90 — slightly faster adaptation when a person changes state
demo_temporal_decay: 0.90

# Gender decision hysteresis band (applied to raw InsightFace/MiVOLO gender score).
# gender > upper_band → male, gender < lower_band → female, between = ambiguous (skip this frame).
demo_gender_lower_band: 0.40
demo_gender_upper_band: 0.60

# Continuous refinement: keep improving demographics even after initial classification
# Set to false for legacy behavior (stop after first good classification)
demo_continuous_refinement: true

# Performance: Face detection frequency (her kaç frame'de bir)
# Stage 2: 3 → 2 — inference ceiling lifts from ~18-20 FPS to ~23-26 FPS on
# RTX 5070, which combined with the 60 FPS smooth-mode overlay gives the
# user "yağ gibi akıyor" without starving the demographics pipeline.
face_detection_interval: 2

# Gender lock: once gender has N consecutive same-gender high-confidence votes, lock it
# Stage 3: 8 → 6 — lock faster once signal is consistent, reduces flip-flop window
demo_gender_lock_threshold: 6

# Performance: Demografi minimum bbox boyutları (pixels)
# ivCam kalitesi arttığı için daha küçük kişileri de işliyoruz
demo_min_bbox_width: 25
demo_min_bbox_height: 40
demo_min_crop_height: 30
demo_min_crop_width: 20

# Queue analytics
queue_alert_threshold: 5
queue_wait_time_window: 300

# Zone entry/exit debounce (frame count)
# Stage 4: stricter debounce so brief bbox flicker doesn't re-enter/exit zones
zone_enter_debounce_frames: 5
zone_exit_debounce_frames: 10

# Stage 4: occlusion grace — how long a track can be "stale" before its zone
# membership is cleared. Prevents a seated person from ghost-exiting their
# table just because a waiter walked in front for half a second.
zone_grace_period_s: 3.0

# Stage 4: per-table occupant clamp. Default for zones with no explicit
# max_capacity on the zone definition. Fixes the "1 kişi, aslında 3 oturuyor"
# bug the other way: prevents runaway over-count when multiple tracks alias
# onto the same seat.
table_max_capacity: 6

# Bbox smoothing EMA alpha range (lower min = heavier smoothing for stationary)
bbox_smoothing_alpha_min: 0.2
bbox_smoothing_alpha_max: 0.9

# Post-NMS overlap filtering: suppress nested/overlapping person detections
# Containment threshold: if smaller box is >70% inside larger box, suppress it
post_nms_containment_thresh: 0.70
# IoU merge threshold: if two similar-sized boxes overlap >60%, suppress lower confidence
post_nms_iou_merge_thresh: 0.60

# Demographics freeze: stop updating once stable
# Stage 3: 0.95 → 0.92, 30 → 20 — live cameras rarely reach 0.95 stability,
# so the lock was never engaging. Looser threshold commits sooner without churn.
demo_age_lock_stability: 0.92
demo_age_lock_min_samples: 15

# Stage 3: ambiguous-band gender recovery.
# When the raw gender score falls in the hysteresis band (lower..upper), the
# current code drops the sample, losing signal on partially turned faces.
# When enabled, we fall back to the majority of the last N recent votes at
# half weight, which preserves the lock mechanism but salvages weak samples.
# OFF by default — flip to true after Stage 3 pytest harness confirms F1 gain.
demo_ambiguous_recovery: false
demo_ambiguous_recent_votes: 3

# Max face yaw (degrees) for gender decision. 70° covers more poses than 55° while staying reliable.
demo_pose_max_yaw: 70.0

# Track persistence: seconds before dropping unseen tracks
# Should be >= track_buffer/fps + margin (90/30 + 1 = 4s)
track_stale_ttl: 4.0

# Table occupancy tracking (v2 state machine)
# Legacy fields (still read for backward compat, not used in new flow)
table_needs_cleaning_timeout: 60
table_empty_timeout: 180
# Uzun oturma uyarısı (saniye, 90 dakika = 5400)
table_long_occupancy_alert: 5400

# v2: State machine parametreleri
# Masa "needs_cleaning" durumuna geçmesi için önce en az bu kadar saniye dolu kalmış olmalı
# (kısa geçişli — masaya bakıp yürüyen — kişileri filtreler)
table_min_occupied_duration: 60.0
# Masa dolu iken boş kalırsa bu süre sonra needs_cleaning olur (kullanıcının "2 dakika" isteği)
table_cleaning_empty_threshold: 120.0
# needs_cleaning → empty otomatik geçiş süresi (staff unutursa, 15 dakika)
table_auto_empty_timeout: 900.0
# Dolu masada kısa (sandalye değişimi, tuvalet) boş kalış tolerensı — bu süreden kısa ise occupied kalır
table_transit_grace: 10.0

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    gpu: tests that require NVIDIA GPU (skip in CI)
    slow: tests that take >5 seconds (skip in fast runs)
    integration: tests that spin up the full analytics engine
    fixture_video: tests that require a real mp4 fixture (skipped if missing)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
